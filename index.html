<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Product Selector</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f7;
            padding: 20px;
        }

        .product-container {
            display: flex;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 800px;
            width: 100%;
            gap: 40px;
        }

        /* Left Side: Image Presentation */
        .image-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f9f9fb;
            border-radius: 12px;
            padding: 20px;
            min-height: 350px;
        }

        .image-section img {
            max-width: 100%;
            max-height: 350px;
            object-fit: contain;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Right Side: Product Details & Selectors */
        .details-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #1d1d1f;
        }

        .price {
            font-size: 20px;
            font-weight: 600;
            color: #0066cc;
            margin-bottom: 25px;
        }

        .selector-group {
            margin-bottom: 20px;
        }

        .selector-label {
            font-size: 14px;
            font-weight: 600;
            color: #86868b;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Color Options Design */
        .color-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .color-btn {
            padding: 12px;
            border: 2px solid #e5e5ea;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            text-align: left;
            transition: all 0.2s ease;
        }

        .color-btn:hover {
            border-color: #b0b0b5;
        }

        .color-btn.active {
            border-color: #0066cc;
            background-color: #f4f9ff;
            color: #0066cc;
        }

        /* Size Options Design */
        .size-options {
            display: flex;
            gap: 12px;
        }

        .size-btn {
            padding: 10px 20px;
            border: 2px solid #e5e5ea;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .size-btn:hover {
            border-color: #b0b0b5;
        }

        .size-btn.active {
            border-color: #0066cc;
            background-color: #0066cc;
            color: #fff;
        }

        /* Responsive Design */
        @media (max-width: 650px) {
            .product-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="product-container">
        <!-- Left Side: Dynamic Image -->
        <div class="image-section">
            <!-- Default Image (Classic Jute) -->
            <img id="product-main-image" src="https://images.unsplash.com/photo-1544816155-12df9643f363?w=500&q=80" alt="Product Image">
        </div>

        <!-- Right Side: Controls -->
        <div class="details-section">
            <h2>Premium Luxury Bag</h2>
            <div class="price">₹2,499</div>

            <!-- Color Selector -->
            <div class="selector-group">
                <div class="selector-label">Material & Color: <span id="selected-color-text" style="color: #1d1d1f;">Classic Jute</span></div>
                <div class="color-options">
                    <button class="color-btn active" data-color="Classic Jute" data-img="https://images.unsplash.com/photo-1544816155-12df9643f363?w=500&q=80">Classic Jute</button>
                    <button class="color-btn" data-color="Royal Velvet" data-img="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500&q=80">Royal Velvet</button>
                    <button class="color-btn" data-color="Matte Leatherette" data-img="https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=500&q=80">Matte Leatherette</button>
                </div>
            </div>

            <!-- Size Selector -->
            <div class="selector-group">
                <div class="selector-label">Size: <span id="selected-size-text" style="color: #1d1d1f;">Medium</span></div>
                <div class="size-options">
                    <button class="size-btn" data-size="Small">S</button>
                    <button class="size-btn active" data-size="Medium">M</button>
                    <button class="size-btn" data-size="Large">L</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript logic to change Image and Size live -->
    <script>
        // Elements select karna
        const mainImage = document.getElementById('product-main-image');
        const colorButtons = document.querySelectorAll('.color-btn');
        const sizeButtons = document.querySelectorAll('.size-btn');
        const selectedColorText = document.getElementById('selected-color-text');
        const selectedSizeText = document.getElementById('selected-size-text');

        // Color Change Logic
        colorButtons.forEach(button => {
            button.addEventListener('click', () => {
                // Purane active button se class hatana
                document.querySelector('.color-btn.active').classList.remove('active');
                // Current button ko active banana
                button.classList.add('active');
                
                // Text aur Image change karna (Smooth effect ke saath)
                const newColor = button.getAttribute('data-color');
                const newImgSrc = button.getAttribute('data-img');
                
                selectedColorText.innerText = newColor;
                
                // Fade effect logic
                mainImage.style.opacity = 0;
                setTimeout(() => {
                    mainImage.src = newImgSrc;
                    mainImage.style.opacity = 1;
                }, 200);
            });
        });

        // Size Change Logic
        sizeButtons.forEach(button => {
            button.addEventListener('click', () => {
                // Purane active size se class hatana
                document.querySelector('.size-btn.active').classList.remove('active');
                // Current button ko active banana
                button.classList.add('active');
                
                // Dynamic size text update karna
                const newSize = button.getAttribute('data-size');
                selectedSizeText.innerText = newSize;

                // Optional: Agar size chota-bada dikhana ho image me:
                if(newSize === 'Small') {
                    mainImage.style.transform = 'scale(0.85)';
                } else if(newSize === 'Large') {
                    mainImage.style.transform = 'scale(1.05)';
                } else {
                    mainImage.style.transform = 'scale(1)';
                }
            });
        });
    </script>
</body>
</html>
